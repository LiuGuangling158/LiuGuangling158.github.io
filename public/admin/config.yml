backend:
  name: github
  repo: liuguangling158/liuguangling158.github.io
  branch: main

# 本地调试时取消下一行注释，并运行: npx decap-server
# local_backend: true

media_folder: public/images
public_folder: /images

locale: zh-Hans

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: blog
    label: 博客文章
    label_singular: 文章
    folder: src/content/blog
    create: true
    slug: '{{year}}-{{month}}-{{day}}-{{slug}}'
    extension: md
    format: frontmatter
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 摘要, name: description, widget: text, required: false }
      - label: 发布日期
        name: pubDate
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
      - label: 更新日期
        name: updatedDate
        widget: datetime
        required: false
        date_format: YYYY-MM-DD
        time_format: false
      - { label: 标签, name: tags, widget: list, default: [] }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 封面图, name: cover, widget: image, required: false }
      - { label: 正文, name: body, widget: markdown }
